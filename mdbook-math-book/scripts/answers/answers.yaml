# Seed answer-audit claims — one entry per machine-checkable problem.
# Run: uv run scripts/answer-audit.py   (or python3 if sympy+pyyaml are installed)
# Each entry: id + type + type-specific keys. EXACT key names (aliases KeyError).
# Authoring rule: write the entry when you write the solution, not in a later pass.
# Notation: write x^2 for powers and 2x for products — the parser handles both.

- id: ch01-warmup-1.1            # arithmetic: expression == claimed_value
  type: arithmetic
  expression: "2*x + 3*x"
  claimed_value: "5*x"

- id: ch01-warmup-1.2            # equation_solutions: each candidate is a root
  type: equation_solutions
  var: x
  lhs: "x^2 - 5*x + 6"
  rhs: "0"
  claimed_solutions: ["2", "3"]

- id: ch01-practice-1.3          # comparison: relation holds  (< <= > >= ==)
  type: comparison
  lhs: "Rational(3,2)"
  rhs: "1"
  relation: ">"

- id: ch02-system-2.1           # system: claimed_solution satisfies every equation
  type: system
  vars: ["x", "y"]
  equations: ["x + y = 3", "x - y = 1"]
  claimed_solution: {x: "2", y: "1"}

- id: ch02-matrix-2.2           # matrix_solution: A x == b
  type: matrix_solution
  matrix: [["1", "0"], ["0", "1"]]
  rhs: ["5", "7"]
  claimed_solution: ["5", "7"]

- id: ch03-identity-3.1         # tolerance: numeric fallback when sympy won't simplify
  type: arithmetic
  expression: "atan(Rational(1,2)) + atan(Rational(1,3)) - pi/4"
  claimed_value: "0"
  tolerance: 1.0e-20

- id: ch04-prove-3.2            # skip: not machine-checkable (proof/sketch/prose) — counted, not run
  type: arithmetic
  skip: true
  expression: "0"
  claimed_value: "0"
